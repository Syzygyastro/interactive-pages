<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Grid Interconnection Funding Landscape 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="hero">
  <h1>AI Grid Interconnection Funding Landscape 2026</h1>
  <div class="hero-stats">
    <span class="hero-stat">11 Countries</span>
    <span class="hero-sep">&middot;</span>
    <span class="hero-stat">74 Programmes</span>
    <span class="hero-sep">&middot;</span>
    <span class="hero-stat">$200B+ Funding</span>
  </div>
  <button class="hero-copy-btn" onclick="copyAllMarkdown(event)">Copy All as Markdown</button>
</div>

<div class="filter-bar">
  <div class="filter-container">
    <span class="filter-label">Filter:</span>
    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterRegion('all', this)">All</button>
      <button class="filter-btn" onclick="filterRegion('europe', this)">Europe</button>
      <button class="filter-btn" onclick="filterRegion('americas', this)">Americas</button>
      <button class="filter-btn" onclick="filterRegion('apac', this)">Asia-Pacific</button>
      <button class="filter-btn" onclick="filterRegion('africa', this)">Africa</button>
    </div>
  </div>
</div>

<div class="grid-container">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<div class="detail-section" id="detailSection" style="display:none">
  <div class="detail-box" id="detailBox"></div>
</div>

<script src="app.js"></script>

</body>
</html>
